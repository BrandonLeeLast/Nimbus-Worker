name = "nimbus-worker"
main = "src/index.ts"
compatibility_date = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "nimbus-db"
database_id = "local"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "NIMBUS_KV"
id = "local"

[vars]
DEBUG = "true"

[env.staging]
name = "nimbus-worker-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "nimbus-db-staging"
database_id = "REPLACE_WITH_STAGING_DB_ID"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "NIMBUS_KV"
id = "REPLACE_WITH_STAGING_KV_ID"

[env.production]
name = "nimbus-worker-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "nimbus-db-production"
database_id = "REPLACE_WITH_PRODUCTION_DB_ID"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "NIMBUS_KV"
id = "REPLACE_WITH_PRODUCTION_KV_ID"
