name = "nimbus-worker"
main = "src/index.ts"
compatibility_date = "2024-03-29"

# STAGING ENVIRONMENT
[env.staging]
name = "nimbus-worker-staging"
route = { pattern = "staging-api.yourdomain.com", custom_domain = true } # Optional: Remove if using default workers.dev URLs

[[env.staging.d1_databases]]
binding = "DB"
database_name = "nimbus-db-staging"
database_id = "STAGING_D1_ID" # Replace with your staging D1 ID

[[env.staging.kv_namespaces]]
binding = "KV"
id = "STAGING_KV_ID" # Replace with your staging KV ID

[env.staging.triggers]
crons = ["0 0 * * *"] 

# PRODUCTION ENVIRONMENT
[env.production]
name = "nimbus-worker-prod"
route = { pattern = "api.yourdomain.com", custom_domain = true } # Optional: Remove if using default workers.dev URLs

[[env.production.d1_databases]]
binding = "DB"
database_name = "nimbus-db-prod"
database_id = "PROD_D1_ID" # Replace with your production D1 ID

[[env.production.kv_namespaces]]
binding = "KV"
id = "PROD_KV_ID" # Replace with your prod KV ID

[env.production.triggers]
crons = ["0 0 * * *"]
